#@TYPE: Machine
#@NAME: Qualcomm QCM6490 Integrated Development Platform
#@DESCRIPTION: Machine configuration for the Integrated Development Platform, with Qualcomm QCM6490

require conf/machine/include/qcom-qcs6490.inc

MACHINE_FEATURES += "efi pci phone"

KERNEL_DEVICETREE ?= " \
                      qcom/qcm6490-idp.dtb \
                      "
# These DTs are not upstreamed and currently exist only in linux-qcom kernels
LINUX_QCOM_KERNEL_DEVICETREE ?= " \
                      qcom/kodiak-el2.dtbo \
                      qcom/kodiak-staging.dtbo \
                      "

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += " \
    packagegroup-qcm6490-idp-firmware \
    packagegroup-qcm6490-idp-hexagon-dsp-binaries \
    qairt-sdk-hexagon-v68 \
    qcom-fastcv-binaries-thundercomm-rb3gen2-dsp \
"

QCOM_CDT_FILE = "cdt_kodiak_idp_0.1.0"
QCOM_BOOT_FILES_SUBDIR = "qcm6490"

QCOM_BOOT_FIRMWARE = "firmware-qcom-boot-qcs6490"
QCOM_CDT_FIRMWARE = "firmware-qcom-cdt-qcs6490"
QCOM_PARTITION_FILES_SUBDIR ?= "partitions/qcm6490-idp/ufs"

# Isolate rt cpu
QCOM_RT_CPU        = "7"
QCOM_IRQAFF        = "0-6"
QCOM_RCU_NOCBS     = "7"
QCOM_RCU_EXPEDITED = "1"
QCOM_CPUIDLE_OFF   = "1"
