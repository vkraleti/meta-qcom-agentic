#@TYPE: Machine
#@NAME: Qualcomm QCS9100 Ride SX Beta Evaluation Kit (EVK)
#@DESCRIPTION: Machine configuration for Qualcomm QCS9100 Ride SX Beta Evaluation Kit (EVK)

require conf/machine/include/qcom-qcs9100.inc

MACHINE_FEATURES += "efi pci"

QCOM_DTB_DEFAULT ?= "qcs9100-ride-r3"

KERNEL_DEVICETREE ?= " \
                      qcom/qcs9100-ride.dtb \
                      qcom/qcs9100-ride-r3.dtb \
                      qcom/sa8775p-ride.dtb \
                      qcom/sa8775p-ride-r3.dtb \
                      "

# These DTs are not upstreamed and currently exist only in linux-qcom kernels
LINUX_QCOM_KERNEL_DEVICETREE ?= " \
                      qcom/lemans-el2.dtbo \
                      qcom/lemans-camx-el2.dtbo \
                      qcom/sa8775p-ride-camx.dtbo \
                      qcom/lemans-staging.dtbo \
                      "

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += " \
    packagegroup-sa8775p-ride-firmware \
    packagegroup-sa8775p-ride-hexagon-dsp-binaries \
    qairt-sdk-hexagon-v73 \
    qcom-fastcv-binaries-sa8775p-ride-dsp \
"

UBOOT_CONFIG = "qcs9100-ride-sx"

QCOM_CDT_FILE = "cdt_ride_sx"
QCOM_BOOT_FILES_SUBDIR = "qcs9100"
QCOM_PARTITION_FILES_SUBDIR ?= "partitions/qcs9100-ride-sx/ufs"

QCOM_BOOT_FIRMWARE = "firmware-qcom-boot-qcs9100"
QCOM_CDT_FIRMWARE = "firmware-qcom-cdt-qcs9100"

# Isolate rt cpu
QCOM_RT_CPU        = "7"
QCOM_IRQAFF        = "0-6"
QCOM_RCU_NOCBS     = "7"
QCOM_RCU_EXPEDITED = "1"
QCOM_CPUIDLE_OFF   = "1"
