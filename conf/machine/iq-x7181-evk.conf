#@TYPE: Machine
#@NAME: Qualcomm Hamoa IoT Evaluation Kit (EVK) based on IQ-X7181
#@DESCRIPTION: Machine configuration for Qualcomm IQ-X7181 Evaluation Kit (EVK)

require conf/machine/include/qcom-hamoa.inc

MACHINE_FEATURES += "efi pci tpm2"

QCOM_DTB_DEFAULT ?= "hamoa-iot-evk"

KERNEL_DEVICETREE ?= " \
                      qcom/hamoa-iot-evk.dtb \
                      qcom/hamoa-iot-evk-camera-imx577.dtbo \
                      "

# These DTs are not upstreamed and currently exist only in linux-qcom kernels
LINUX_QCOM_KERNEL_DEVICETREE ?= " \
    qcom/hamoa-evk-camx.dtbo \
    qcom/hamoa-staging.dtbo \
"

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += " \
    packagegroup-hamoa-iot-evk-firmware \
    packagegroup-hamoa-iot-evk-hexagon-dsp-binaries \
    qcom-fastcv-binaries-hamoa-iot-evk-dsp \
"

QCOM_CDT_FILE = "IQ_X_EVK_CDT"
QCOM_BOOT_FILES_SUBDIR = "iq-x7181"
QCOM_PARTITION_FILES_SUBDIR ?= "partitions/iq-x7181-evk/ufs"
QCOM_PARTITION_FILES_SUBDIR_SPINOR ?= "partitions/iq-x7181-evk/spinor"

QCOM_BOOT_FIRMWARE = "firmware-qcom-boot-iq-x7181"
QCOM_CDT_FIRMWARE = "firmware-qcom-cdt-iq-x7181"

CAPSULE_GUID       = "0F6D58FC-2258-4D27-9E23-D77219B0897C"

# Isolate rt cpu
QCOM_RT_CPU        = "11"
QCOM_IRQAFF        = "0-10"
QCOM_RCU_NOCBS     = "11"
QCOM_RCU_EXPEDITED = "1"
QCOM_CPUIDLE_OFF   = "1"
