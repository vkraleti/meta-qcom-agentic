name: Build Yocto

on:
  workflow_call:
    inputs:
      profile:
        required: false
        type: string
        default: "full" # values: pr | full
      skip_if_github_cached:
        required: false
        type: boolean
        default: false
        description: "Skip the build matrix if the github actions cache already records a previously-successful run for the same inputs"
    outputs:
      artifacts_url:
        description: "URL to retrieve build artifacts"
        value: ${{ jobs.create-output.outputs.url }}
      build_skipped:
        description: "True when the compile matrix was skipped because the github cache recorded a previously-successful build for the same inputs"
        value: ${{ jobs.github-cache-check.outputs.cache_hit }}

# Concurrency is used to prevent multiple workflows from running for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: true

env:
  CACHE_DIR: /efs/qli/meta-qcom
  KAS_CLONE_DEPTH: 1

jobs:
  kas-setup:
    if: github.repository_owner == 'qualcomm-linux'
    runs-on: [self-hosted, qcom-u2404, amd64]
    steps:
      - name: Setting up kas-container
        run: |
          KAS_CONTAINER=$RUNNER_TEMP/kas-container
          echo "KAS_CONTAINER=$KAS_CONTAINER" >> $GITHUB_ENV
          LATEST=$(git ls-remote --tags --refs --sort="v:refname" https://github.com/siemens/kas | tail -n1 | sed 's/.*\///')
          wget -qO ${KAS_CONTAINER} https://raw.githubusercontent.com/siemens/kas/refs/tags/$LATEST/kas-container
          chmod +x ${KAS_CONTAINER}

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run kas lock
        run: |
          ${KAS_CONTAINER} lock ci/base.yml:ci/qcom-distro.yml:ci/meta-arm.yml

      - name: Upload kas lockfile
        uses: actions/upload-artifact@v6
        with:
          name: kas-lockfile
          path: ci/*.lock.yml

      - name: Upload kas-container
        uses: actions/upload-artifact@v6
        with:
          name: kas-container
          path: ${{ env.KAS_CONTAINER }}

  github-cache-check:
    needs: kas-setup
    if: github.repository_owner == 'qualcomm-linux'
    runs-on: ubuntu-latest
    outputs:
      cache_hit: ${{ steps.restore.outputs.cache-hit == 'true' }}
      run_hash: ${{ steps.hash.outputs.run_hash }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download kas lockfile
        uses: actions/download-artifact@v7
        with:
          name: kas-lockfile
          path: ci

      - name: Compute build input hash
        id: hash
        run: |
          # Hash inputs that fully determine the build:
          # - the resolved base.lock.yml produced by `kas lock` (pins every layer)
          # - the meta-qcom revision being built
          LOCK_HASH=$(sha256sum ci/base.lock.yml | cut -d' ' -f1)
          SRC_HASH=$(git rev-parse HEAD)
          RUN_HASH=$(printf '%s\n%s' "$LOCK_HASH" "$SRC_HASH" | sha256sum | cut -d' ' -f1)
          echo "base.lock.yml hash: $LOCK_HASH"
          echo "meta-qcom HEAD: $SRC_HASH"
          echo "Combined run hash: $RUN_HASH"
          echo "run_hash=$RUN_HASH" >> "$GITHUB_OUTPUT"

      - name: Look up previous successful build marker in github cache
        id: restore
        uses: actions/cache/restore@v5
        with:
          path: /tmp/build-success-marker
          key: build-success-${{ github.repository }}-${{ github.workflow }}-${{ github.ref_name }}-${{ steps.hash.outputs.run_hash }}
          lookup-only: true

      - name: Report github-cache-check decision
        run: |
          if [ "${{ inputs.skip_if_github_cached }}" != "true" ]; then
            echo "skip_if_github_cached not set; build will run"
          elif [ "${{ steps.restore.outputs.cache-hit }}" = "true" ]; then
            echo "Run cache hit on key build-success, hash ${{ steps.hash.outputs.run_hash }}: skipping build matrix"
          else
            echo "No previous successful build run recorded in github cache for this hash: build will run"
          fi

  yocto-run-checks:
    needs: [kas-setup, github-cache-check]
    if: |
      github.repository_owner == 'qualcomm-linux' &&
      (inputs.skip_if_github_cached != true || needs.github-cache-check.outputs.cache_hit != 'true')
    runs-on: [self-hosted, qcom-u2404, amd64]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download kas lockfile
        uses: actions/download-artifact@v7
        with:
          name: kas-lockfile
          path: ci

      - name: Download kas-container
        uses: actions/download-artifact@v7
        with:
          name: kas-container
          path: ${{ runner.temp }}

      - name: Setting up kas-container
        run: |
          KAS_CONTAINER=$RUNNER_TEMP/kas-container
          echo "KAS_CONTAINER=$KAS_CONTAINER" >> $GITHUB_ENV
          chmod +x $KAS_CONTAINER

      - name: Setup cache variables (used by oe-selftest)
        run: |
          echo "DL_DIR=${CACHE_DIR}/downloads" >> $GITHUB_ENV
          echo "SSTATE_DIR=${CACHE_DIR}/sstate-cache-$(date '+%Y-%m')" >> $GITHUB_ENV

      - name: Run Yocto patchreview
        run: |
          ci/kas-container-shell-helper.sh ci/yocto-patchreview.sh

      - name: Run yocto-check-layer
        run: |
          ci/kas-container-shell-helper.sh ci/yocto-check-layer.sh

      - name: Run oe-selftest
        run: |
          ci/kas-container-shell-helper.sh ci/oe-selftest.sh

  compile-env:
    if: github.repository_owner == 'qualcomm-linux'
    runs-on: ubuntu-latest
    outputs:
      CACHE_DIR: ${{ steps.compile_env.outputs.CACHE_DIR }}
    steps:
      - name: Setup compile variables
        id: compile_env
        run: |
          echo "CACHE_DIR=${{env.CACHE_DIR}}" >> $GITHUB_OUTPUT

  compile_warm_up:
    needs: [kas-setup, github-cache-check, compile-env]
    if: |
      github.repository_owner == 'qualcomm-linux' &&
      (inputs.skip_if_github_cached != true || needs.github-cache-check.outputs.cache_hit != 'true')
    strategy:
      fail-fast: true
      matrix:
        machine:
          - glymur-crd
          - qcom-armv8a
          - rb3gen2-core-kit
        distro:
          - name: nodistro
            yamlfile: ""
          - name: qcom-distro
            yamlfile: ':ci/qcom-distro.yml'
        kernel:
          - type: default
            dirname: ""
            yamlfile: ""
    uses: ./.github/workflows/compile.yml
    with:
      name: ${{ matrix.machine }}/${{ matrix.distro.name }}${{ matrix.kernel.dirname }}
      machine: ${{matrix.machine}}
      distro_yaml: ${{matrix.distro.yamlfile}}
      distro_name: ${{matrix.distro.name}}
      kernel_yaml: ${{matrix.kernel.yamlfile}}
      kernel_dirname: ${{matrix.kernel.dirname}}
      cache_dir: ${{ needs.compile-env.outputs.CACHE_DIR }}

  compile_sdk:
    needs: [github-cache-check, compile_warm_up, compile-env]
    if: |
      github.repository_owner == 'qualcomm-linux' &&
      (inputs.skip_if_github_cached != true || needs.github-cache-check.outputs.cache_hit != 'true')
    uses: ./.github/workflows/compile.yml
    with:
      name: qcom-armv8a/qcom-distro-sdk
      sdk: true
      target: false
      world: false
      machine: 'qcom-armv8a'
      distro_yaml: ':ci/qcom-distro.yml'
      distro_name: 'qcom-distro-sdk'
      kernel_yaml: ''
      kernel_dirname: ''
      cache_dir: ${{ needs.compile-env.outputs.CACHE_DIR }}

  compile:
    needs: [github-cache-check, compile_warm_up, compile-env]
    if: |
      github.repository_owner == 'qualcomm-linux' &&
      (inputs.skip_if_github_cached != true || needs.github-cache-check.outputs.cache_hit != 'true')
    strategy:
      fail-fast: false
      matrix:
        machine:
          - glymur-crd
          - iq-615-evk
          - iq-8275-evk
          - iq-9075-evk
          - iq-x5121-evk
          - iq-x7181-evk
          - kaanapali-mtp
          - qcm6490-idp
          - qcom-armv8a
          - qcs615-ride
          - qcs8300-ride-sx
          - qcs9100-ride-sx
          - rb1-core-kit
          - rb3gen2-core-kit
          - sm8750-mtp
        distro:
          - name: nodistro
            yamlfile: ""
          - name: qcom-distro
            yamlfile: ':ci/qcom-distro.yml'
          - name: qcom-distro-catchall
            yamlfile: ':ci/qcom-distro-catchall.yml'
          - name: debug
            yamlfile: ':ci/qcom-distro-catchall.yml:ci/debug.yml'
          - name: performance
            yamlfile: ':ci/qcom-distro-catchall.yml:ci/performance.yml'
        kernel:
          - type: default
            dirname: ""
            yamlfile: ""
          - type: 6.18
            dirname: "_linux-qcom-6.18"
            yamlfile: ":ci/linux-qcom-6.18.yml"
          - type: rt-6.18-distro-kvm
            dirname: "_linux-qcom-rt-6.18_qcom-distro-kvm"
            yamlfile: ":ci/linux-qcom-rt-6.18.yml:ci/qcom-distro-kvm.yml"
        exclude:
          # Exclude jobs from compile_warm_up
          - machine: glymur-crd
            distro:
                name: nodistro
            kernel:
                type: default
          - machine: glymur-crd
            distro:
                name: qcom-distro
            kernel:
                type: default
          - machine: qcom-armv8a
            distro:
                name: nodistro
            kernel:
                type: default
          - machine: qcom-armv8a
            distro:
                name: qcom-distro
            kernel:
                type: default
          - machine: rb3gen2-core-kit
            distro:
                name: nodistro
            kernel:
                type: default
          - machine: rb3gen2-core-kit
            distro:
                name: qcom-distro
            kernel:
                type: default
        include:
          # Additional builds for specific machines
          - machine: qcom-armv8a
            distro:
                name: nodistro-nogl
                yamlfile: ':ci/test-oe-nogl.yml'
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: qcom-armv8a
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro.yml'
            kernel:
                type: additional
                dirname: "_linux-yocto-dev"
                yamlfile: ":ci/linux-yocto-dev.yml"
          - machine: iq-9075-evk
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro.yml'
            kernel:
                type: qcom-next-rt
                dirname: "_linux-qcom-next-rt"
                yamlfile: ":ci/linux-qcom-next-rt.yml"
          - machine: iq-9075-evk
            distro:
                name: qcom-distro-dpdk
                yamlfile: ':ci/qcom-distro.yml:ci/dpdk.yml'
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: rb3gen2-core-kit
            distro:
                name: qcom-distro-kvm
                yamlfile: ':ci/qcom-distro-kvm.yml'
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: qcom-armv7a
            distro:
                name: nodistro
                yamlfile: ''
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: qcom-armv7a
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro-multimedia-image.yml'
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: qcs615-ride
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro.yml'
            kernel:
                type: u-boot-qcom-6.18
                dirname: "_linux-qcom-6.18_u-boot-qcom"
                yamlfile: ":ci/linux-qcom-6.18.yml:ci/u-boot-qcom.yml"
          - machine: rb3gen2-core-kit
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro.yml'
            kernel:
                type: u-boot-qcom-6.18
                dirname: "_linux-qcom-6.18_u-boot-qcom"
                yamlfile: ":ci/linux-qcom-6.18.yml:ci/u-boot-qcom.yml"
          - machine: iq-9075-evk
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro.yml'
            kernel:
                type: u-boot-qcom-6.18
                dirname: "_linux-qcom-6.18_u-boot-qcom"
                yamlfile: ":ci/linux-qcom-6.18.yml:ci/u-boot-qcom.yml"
          - machine: iq-615-evk
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro.yml'
            kernel:
                type: u-boot-qcom-6.18
                dirname: "_linux-qcom-6.18_u-boot-qcom"
                yamlfile: ":ci/linux-qcom-6.18.yml:ci/u-boot-qcom.yml"
          - machine: rb3gen2-core-kit-open-fw
            distro:
                name: qcom-distro-kvm
                yamlfile: ':ci/qcom-distro-kvm.yml'
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: iq-9075-evk-open-fw
            distro:
                name: qcom-distro-kvm
                yamlfile: ':ci/qcom-distro-kvm.yml'
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: rb3gen2-core-kit
            distro:
                name: nodistro
                yamlfile: ':ci/meta-arm.yml:ci/capsule.yml:ci/capsule-test-keys.yml'
            kernel:
                type: capsule
                dirname: "_capsule"
                yamlfile: ""
          - machine: rb3gen2-core-kit
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro.yml'
            kernel:
                type: u-boot-qcom-fit-6.18
                dirname: "_linux-qcom-6.18_u-boot-qcom-fit"
                yamlfile: ":ci/linux-qcom-6.18.yml:ci/u-boot-qcom.yml:ci/kernel-fit-image.yml"
          - machine: qcs9100-ride-sx
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro.yml'
            kernel:
                type: u-boot-qcom-fit-6.18
                dirname: "_linux-qcom-6.18_u-boot-qcom-fit"
                yamlfile: ":ci/linux-qcom-6.18.yml:ci/u-boot-qcom.yml:ci/kernel-fit-image.yml"
          - machine: sdx75-idp
            distro:
                name: nodistro
                yamlfile: ""
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
    uses: ./.github/workflows/compile.yml
    with:
      name: ${{ matrix.machine }}/${{ matrix.distro.name }}${{ matrix.kernel.dirname }}
      enabled: ${{inputs.profile != 'pr' || (matrix.distro.name != 'debug' && matrix.distro.name != 'performance')}}
      machine: ${{matrix.machine}}
      distro_yaml: ${{matrix.distro.yamlfile}}
      distro_name: ${{matrix.distro.name}}
      kernel_yaml: ${{matrix.kernel.yamlfile}}
      kernel_dirname: ${{matrix.kernel.dirname}}
      cache_dir: ${{ needs.compile-env.outputs.CACHE_DIR }}

  publish_summary:
    needs: [github-cache-check, compile, compile_sdk]
    if: |
      always() && github.repository_owner == 'qualcomm-linux' &&
      (inputs.skip_if_github_cached != true || needs.github-cache-check.outputs.cache_hit != 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/print-build-output
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: build-url*

  github-cache-save:
    needs: [github-cache-check, compile, compile_sdk]
    if: |
      github.repository_owner == 'qualcomm-linux' &&
      inputs.skip_if_github_cached == true &&
      needs.github-cache-check.outputs.cache_hit != 'true' &&
      needs.compile.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Create build success marker
        run: date -u +%FT%TZ > /tmp/build-success-marker

      - name: Save successful build marker to github cache
        uses: actions/cache/save@v5
        with:
          path: /tmp/build-success-marker
          key: build-success-${{ github.repository }}-${{ github.workflow }}-${{ github.ref_name }}-${{ needs.github-cache-check.outputs.run_hash }}

  build_successful:
    if: github.repository_owner == 'qualcomm-linux'
    needs: [compile, compile_sdk]
    runs-on: ubuntu-latest
    steps:
      - name: Build completed successfully
        run: |
          echo "All compile matrix jobs succeeded and artifacts uploaded to S3 bucket"
