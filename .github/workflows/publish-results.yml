name: Publish test results

on:
  workflow_call:
    inputs:
      workflow_id:
        required: true
        type: string
      event_name:
        required: true
        type: string
      event_file:
        required: true
        type: string
      commit:
        required: true
        type: string

permissions:
  checks: write
  pull-requests: write
  contents: read
  packages: read

jobs:
  publish-test-results:
    name: "Publish Tests Results"
    runs-on: ubuntu-latest
    steps:
      - name: Download result files
        uses: actions/download-artifact@v7
        with:
            run-id: ${{ inputs.workflow_id }}
            path: artifacts
            github-token: ${{ github.token }}

      - name: Download result files PR
        if: ${{ github.run_id != inputs.workflow_id }}
        uses: actions/download-artifact@v7
        with:
            path: artifacts
            github-token: ${{ github.token }}

      - name: "List files"
        id: listfiles
        run: |
          echo $GITHUB_WORKSPACE
          ls -R $GITHUB_WORKSPACE
          if ! find "${GITHUB_WORKSPACE}/artifacts/" -name '*.xml' -print -quit | grep -q .; then
            echo "Error: no .xml files found"
            exit 1
          fi

      - id: app_token
        uses: actions/create-github-app-token@v3
        if: always()
        with:
          client-id: 2291458
          private-key: ${{ secrets.TEST_REPORTING_APP_TOKEN }}

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: |
          always()
          && contains(steps.listfiles.outcome, 'success')
        with:
          commit: ${{ inputs.commit }}
          event_file: ${{ inputs.event_file}}
          event_name: ${{ inputs.event_name }}
          files: "${{ github.workspace }}/artifacts/**/*.xml"
          action_fail: true
          action_fail_on_inconclusive: true
          github_token: ${{ steps.app_token.outputs.token }}
          report_individual_runs: true
          report_suite_logs: any
